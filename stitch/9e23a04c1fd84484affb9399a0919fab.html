<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Supervisor - Paused</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#92bad4",
                        "surface-container-highest": "#303539",
                        "on-background": "#dee3e8",
                        "inverse-surface": "#dee3e8",
                        "on-primary-fixed": "#001e2c",
                        "primary-fixed": "#c4e7ff",
                        "outline": "#87929a",
                        "on-primary-fixed-variant": "#004c69",
                        "on-surface-variant": "#bdc8d1",
                        "on-error-container": "#ffdad6",
                        "primary": "#8ed5ff",
                        "surface-container": "#1b2024",
                        "inverse-on-surface": "#2c3135",
                        "on-secondary-fixed": "#001e2c",
                        "primary-fixed-dim": "#7bd0ff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "background": "#0f1418",
                        "secondary": "#a4cce6",
                        "on-secondary": "#023449",
                        "on-tertiary-container": "#613b00",
                        "secondary-fixed-dim": "#a4cce6",
                        "tertiary-container": "#f1a02b",
                        "on-tertiary": "#472a00",
                        "outline-variant": "#3e484f",
                        "surface": "#0f1418",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container-lowest": "#0a0f12",
                        "secondary-container": "#214b61",
                        "inverse-primary": "#00668a",
                        "on-primary-container": "#004965",
                        "surface-container-high": "#252b2e",
                        "error": "#ffb4ab",
                        "surface-tint": "#7bd0ff",
                        "surface-dim": "#0f1418",
                        "on-error": "#690005",
                        "surface-variant": "#303539",
                        "surface-container-low": "#171c20",
                        "tertiary": "#ffc176",
                        "tertiary-fixed-dim": "#ffb960",
                        "on-primary": "#00354a",
                        "primary-container": "#38bdf8",
                        "surface-bright": "#343a3e",
                        "on-surface": "#dee3e8",
                        "secondary-fixed": "#c4e7ff",
                        "on-tertiary-fixed": "#2a1700",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#214b61"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "44px",
                        "grid-gap": "2px",
                        "container-max": "1200px",
                        "cell-size": "32px",
                        "panel-padding": "1.5rem"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "stats-number": ["Geist"],
                        "headline-sm": ["Space Grotesk"],
                        "label-sm": ["Geist"],
                        "display-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "stats-number": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom styles to handle specific visual tokens not purely covered by tailwind config utilities out of the box */
        .neon-glow-primary {
            box-shadow: 0 0 16px theme('colors.primary');
        }
        .text-neon-primary {
            text-shadow: 0 0 8px theme('colors.primary');
        }
        
        /* Simulated game board grid pattern for background context */
        .game-grid-bg {
            background-size: 34px 34px; /* cell-size + grid-gap */
            background-image: 
                linear-gradient(to right, theme('colors.outline-variant') 1px, transparent 1px),
                linear-gradient(to bottom, theme('colors.outline-variant') 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden antialiased selection:bg-primary selection:text-on-primary">
<!-- 
        BACKGROUND CONTEXT: Simulated Game Board
        Provides depth to the pause overlay. It's intentionally dimmed and blurred via the overlay above it.
    -->
<div class="absolute inset-0 flex justify-center items-center opacity-40 pointer-events-none z-0">
<!-- Game Board Container -->
<div class="relative w-[340px] h-[680px] bg-surface-container border-2 border-outline-variant p-[2px]">
<div class="w-full h-full game-grid-bg opacity-20"></div>
<!-- Simulated Active Piece (T-Tetromino) -->
<div class="absolute bottom-[68px] left-[136px] w-[32px] h-[32px] bg-[#a855f7] border border-[#d8b4fe] shadow-[0_0_8px_#a855f7]"></div>
<div class="absolute bottom-[68px] left-[170px] w-[32px] h-[32px] bg-[#a855f7] border border-[#d8b4fe] shadow-[0_0_8px_#a855f7]"></div>
<div class="absolute bottom-[68px] left-[204px] w-[32px] h-[32px] bg-[#a855f7] border border-[#d8b4fe] shadow-[0_0_8px_#a855f7]"></div>
<div class="absolute bottom-[102px] left-[170px] w-[32px] h-[32px] bg-[#a855f7] border border-[#d8b4fe] shadow-[0_0_8px_#a855f7]"></div>
<!-- Simulated Stacked Blocks -->
<div class="absolute bottom-[2px] left-[34px] w-[32px] h-[32px] bg-[#3b82f6] border border-[#93c5fd]"></div>
<div class="absolute bottom-[2px] left-[68px] w-[32px] h-[32px] bg-[#3b82f6] border border-[#93c5fd]"></div>
<div class="absolute bottom-[36px] left-[34px] w-[32px] h-[32px] bg-[#3b82f6] border border-[#93c5fd]"></div>
</div>
</div>
<!-- 
        PAUSE OVERLAY: Main Interactive Layer
        Dark, semi-transparent backdrop focusing attention entirely on the menu.
    -->
<div class="absolute inset-0 z-50 bg-background/85 backdrop-blur-md flex flex-col items-center justify-center p-6">
<!-- Header -->
<div class="mb-16 flex flex-col items-center text-center space-y-2">
<span class="material-symbols-outlined text-primary text-5xl mb-2" style="font-variation-settings: 'FILL' 1;">pause_circle</span>
<h1 class="font-display-lg text-display-lg text-primary uppercase tracking-tighter text-neon-primary">Paused</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Focus required. System on standby.</p>
</div>
<!-- Menu Actions -->
<nav aria-label="Pause Menu" class="flex flex-col w-full max-w-[280px] space-y-4">
<!-- Primary Action: Resume (Pre-focused style visually) -->
<button class="group relative flex items-center justify-center h-[56px] px-6 w-full bg-primary-container text-on-primary-container border border-primary font-headline-sm text-headline-sm uppercase tracking-widest transition-all duration-150 active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary neon-glow-primary">
<span class="material-symbols-outlined mr-3">play_arrow</span>
                Resume
            </button>
<!-- Secondary Action: Restart -->
<button class="group flex items-center justify-center h-touch-target px-6 w-full bg-transparent border border-outline-variant text-on-background font-headline-sm text-headline-sm uppercase tracking-widest transition-colors duration-150 hover:bg-surface-container-high hover:border-outline hover:text-primary-fixed active:bg-surface-container-highest focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary">
<span class="material-symbols-outlined mr-3 text-on-surface-variant group-hover:text-primary-fixed transition-colors">replay</span>
                Restart
            </button>
<!-- Destructive/Exit Action -->
<button class="group flex items-center justify-center h-touch-target px-6 w-full bg-transparent border border-outline-variant text-on-background font-headline-sm text-headline-sm uppercase tracking-widest mt-8 transition-colors duration-150 hover:bg-error hover:text-on-error hover:border-error active:bg-error/80 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-error">
<span class="material-symbols-outlined mr-3 text-on-surface-variant group-hover:text-on-error transition-colors">logout</span>
                Exit to Menu
            </button>
</nav>
<!-- Optional: Session Stats (High-end UI element adding value to the pause screen) -->
<div class="mt-20 flex space-x-12 border-t border-outline-variant/50 pt-8 opacity-80">
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Current Score</span>
<span class="font-stats-number text-stats-number text-secondary">014,850</span>
</div>
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Time Elapsed</span>
<span class="font-stats-number text-stats-number text-secondary">04:12</span>
</div>
</div>
</div>
</body></html>
