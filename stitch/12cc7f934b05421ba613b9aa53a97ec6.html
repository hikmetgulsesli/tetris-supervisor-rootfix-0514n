<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Supervisor - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-secondary-container": "#92bad4",
                "surface-container-highest": "#303539",
                "on-background": "#dee3e8",
                "inverse-surface": "#dee3e8",
                "on-primary-fixed": "#001e2c",
                "primary-fixed": "#c4e7ff",
                "outline": "#87929a",
                "on-primary-fixed-variant": "#004c69",
                "on-surface-variant": "#bdc8d1",
                "on-error-container": "#ffdad6",
                "primary": "#8ed5ff",
                "surface-container": "#1b2024",
                "inverse-on-surface": "#2c3135",
                "on-secondary-fixed": "#001e2c",
                "primary-fixed-dim": "#7bd0ff",
                "on-tertiary-fixed-variant": "#653e00",
                "background": "#0f1418",
                "secondary": "#a4cce6",
                "on-secondary": "#023449",
                "on-tertiary-container": "#613b00",
                "secondary-fixed-dim": "#a4cce6",
                "tertiary-container": "#f1a02b",
                "on-tertiary": "#472a00",
                "outline-variant": "#3e484f",
                "surface": "#0f1418",
                "tertiary-fixed": "#ffddb8",
                "surface-container-lowest": "#0a0f12",
                "secondary-container": "#214b61",
                "inverse-primary": "#00668a",
                "on-primary-container": "#004965",
                "surface-container-high": "#252b2e",
                "error": "#ffb4ab",
                "surface-tint": "#7bd0ff",
                "surface-dim": "#0f1418",
                "on-error": "#690005",
                "surface-variant": "#303539",
                "surface-container-low": "#171c20",
                "tertiary": "#ffc176",
                "tertiary-fixed-dim": "#ffb960",
                "on-primary": "#00354a",
                "primary-container": "#38bdf8",
                "surface-bright": "#343a3e",
                "on-surface": "#dee3e8",
                "secondary-fixed": "#c4e7ff",
                "on-tertiary-fixed": "#2a1700",
                "error-container": "#93000a",
                "on-secondary-fixed-variant": "#214b61"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "touch-target": "44px",
                "grid-gap": "2px",
                "container-max": "1200px",
                "cell-size": "32px",
                "panel-padding": "1.5rem"
        },
        "fontFamily": {
                "body-md": [
                        "Geist", "sans-serif"
                ],
                "stats-number": [
                        "Geist", "sans-serif"
                ],
                "headline-sm": [
                        "Space Grotesk", "sans-serif"
                ],
                "label-sm": [
                        "Geist", "sans-serif"
                ],
                "display-lg": [
                        "Space Grotesk", "sans-serif"
                ]
        },
        "fontSize": {
                "body-md": [
                        "16px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                        }
                ],
                "stats-number": [
                        "24px",
                        {
                                "lineHeight": "32px",
                                "fontWeight": "700"
                        }
                ],
                "headline-sm": [
                        "18px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "600"
                        }
                ],
                "label-sm": [
                        "12px",
                        {
                                "lineHeight": "16px",
                                "letterSpacing": "0.05em",
                                "fontWeight": "600"
                        }
                ],
                "display-lg": [
                        "48px",
                        {
                                "lineHeight": "1.1",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ]
        }
},
    },
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  body {
    background-color: #0F172A; /* Direct override for requested background */
    color: #dee3e8;
  }
  .ghost-grid {
    background-image: 
      linear-gradient(to right, #334155 1px, transparent 1px),
      linear-gradient(to bottom, #334155 1px, transparent 1px);
    background-size: 34px 34px; /* cell-size + grid-gap */
    opacity: 0.1;
  }
  .neon-glow-primary {
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.5), 0 0 20px rgba(56, 189, 248, 0.3);
  }
  .neon-box-shadow {
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
  }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md text-body-md antialiased">
<!-- Background Grid Effect -->
<div class="absolute inset-0 z-0 flex justify-center items-center pointer-events-none">
<div class="w-full max-w-[800px] h-full ghost-grid border-x border-[#334155] opacity-20"></div>
</div>
<!-- Decorative Tetromino Elements -->
<div class="absolute top-1/4 left-10 md:left-32 z-0 opacity-40 rotate-12">
<div class="grid grid-cols-2 gap-grid-gap w-[66px]">
<div class="w-cell-size h-cell-size bg-[#FACC15] shadow-[0_0_8px_#FACC15] border border-[#FEF08A]"></div>
<div class="w-cell-size h-cell-size bg-[#FACC15] shadow-[0_0_8px_#FACC15] border border-[#FEF08A]"></div>
<div class="w-cell-size h-cell-size bg-[#FACC15] shadow-[0_0_8px_#FACC15] border border-[#FEF08A]"></div>
<div class="w-cell-size h-cell-size bg-[#FACC15] shadow-[0_0_8px_#FACC15] border border-[#FEF08A]"></div>
</div>
</div>
<div class="absolute bottom-1/4 right-10 md:right-32 z-0 opacity-40 -rotate-12">
<div class="grid grid-cols-3 gap-grid-gap w-[100px]">
<div class="col-start-2 w-cell-size h-cell-size bg-[#A855F7] shadow-[0_0_8px_#A855F7] border border-[#D8B4FE]"></div>
<div class="col-start-1 row-start-2 w-cell-size h-cell-size bg-[#A855F7] shadow-[0_0_8px_#A855F7] border border-[#D8B4FE]"></div>
<div class="col-start-2 row-start-2 w-cell-size h-cell-size bg-[#A855F7] shadow-[0_0_8px_#A855F7] border border-[#D8B4FE]"></div>
<div class="col-start-3 row-start-2 w-cell-size h-cell-size bg-[#A855F7] shadow-[0_0_8px_#A855F7] border border-[#D8B4FE]"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center w-full max-w-md px-6 py-12">
<!-- Logo Section -->
<div class="mb-16 text-center">
<div class="inline-block relative">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter uppercase neon-glow-primary m-0">TETRIS</h1>
<div class="absolute -bottom-2 -right-4 bg-primary-container text-on-primary-container font-label-sm text-label-sm px-2 py-0.5 rounded-sm uppercase tracking-widest font-bold shadow-[0_0_10px_rgba(56,189,248,0.5)]">SUPERVISOR</div>
</div>
<p class="mt-6 text-on-surface-variant font-label-sm text-label-sm uppercase tracking-widest">System Ready • Insert Coin</p>
</div>
<!-- Navigation / Action Menu -->
<nav aria-label="Main Menu" class="flex flex-col gap-4 w-full">
<!-- Start Game Button -->
<button class="group relative w-full min-h-touch-target flex items-center justify-between px-6 py-4 bg-transparent border border-outline-variant hover:border-primary focus:border-primary hover:bg-primary-container focus:bg-primary-container hover:text-on-primary-container focus:text-on-primary-container transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#0F172A] neon-box-shadow">
<span class="font-headline-sm text-headline-sm uppercase tracking-wide">Start Game</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 group-focus:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<!-- Decorative corner brackets for hover state -->
<div class="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-transparent group-hover:border-on-primary-container group-focus:border-on-primary-container"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-transparent group-hover:border-on-primary-container group-focus:border-on-primary-container"></div>
</button>
<!-- Controls Button -->
<button class="group relative w-full min-h-touch-target flex items-center justify-between px-6 py-4 bg-transparent border border-outline-variant hover:border-primary focus:border-primary hover:bg-primary-container focus:bg-primary-container hover:text-on-primary-container focus:text-on-primary-container transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#0F172A]">
<span class="font-headline-sm text-headline-sm uppercase tracking-wide">Controls</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 group-focus:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">keyboard</span>
</button>
<!-- High Scores Button -->
<button class="group relative w-full min-h-touch-target flex items-center justify-between px-6 py-4 bg-transparent border border-outline-variant hover:border-primary focus:border-primary hover:bg-primary-container focus:bg-primary-container hover:text-on-primary-container focus:text-on-primary-container transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#0F172A]">
<span class="font-headline-sm text-headline-sm uppercase tracking-wide">High Scores</span>
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 group-focus:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">leaderboard</span>
</button>
</nav>
<!-- Version / Footer Info -->
<div class="mt-16 text-center">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">v.1.0.4 - Build 89A</span>
</div>
</main>
</body></html>
