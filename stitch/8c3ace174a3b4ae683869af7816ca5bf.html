<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Over - Tetris Supervisor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Custom Fonts to map to config (assuming standard fallbacks if Geist isn't loaded directly, but will use sans-serif fallbacks to mimic) -->
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        /* Font family fallbacks to match config expectations */
        @font-face {
            font-family: 'Geist';
            src: local('Inter'), local('sans-serif');
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#92bad4",
                    "surface-container-highest": "#303539",
                    "on-background": "#dee3e8",
                    "inverse-surface": "#dee3e8",
                    "on-primary-fixed": "#001e2c",
                    "primary-fixed": "#c4e7ff",
                    "outline": "#87929a",
                    "on-primary-fixed-variant": "#004c69",
                    "on-surface-variant": "#bdc8d1",
                    "on-error-container": "#ffdad6",
                    "primary": "#8ed5ff",
                    "surface-container": "#1b2024",
                    "inverse-on-surface": "#2c3135",
                    "on-secondary-fixed": "#001e2c",
                    "primary-fixed-dim": "#7bd0ff",
                    "on-tertiary-fixed-variant": "#653e00",
                    "background": "#0f1418",
                    "secondary": "#a4cce6",
                    "on-secondary": "#023449",
                    "on-tertiary-container": "#613b00",
                    "secondary-fixed-dim": "#a4cce6",
                    "tertiary-container": "#f1a02b",
                    "on-tertiary": "#472a00",
                    "outline-variant": "#3e484f",
                    "surface": "#0f1418",
                    "tertiary-fixed": "#ffddb8",
                    "surface-container-lowest": "#0a0f12",
                    "secondary-container": "#214b61",
                    "inverse-primary": "#00668a",
                    "on-primary-container": "#004965",
                    "surface-container-high": "#252b2e",
                    "error": "#ffb4ab",
                    "surface-tint": "#7bd0ff",
                    "surface-dim": "#0f1418",
                    "on-error": "#690005",
                    "surface-variant": "#303539",
                    "surface-container-low": "#171c20",
                    "tertiary": "#ffc176",
                    "tertiary-fixed-dim": "#ffb960",
                    "on-primary": "#00354a",
                    "primary-container": "#38bdf8",
                    "surface-bright": "#343a3e",
                    "on-surface": "#dee3e8",
                    "secondary-fixed": "#c4e7ff",
                    "on-tertiary-fixed": "#2a1700",
                    "error-container": "#93000a",
                    "on-secondary-fixed-variant": "#214b61"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "touch-target": "44px",
                    "grid-gap": "2px",
                    "container-max": "1200px",
                    "cell-size": "32px",
                    "panel-padding": "1.5rem"
            },
            "fontFamily": {
                    "body-md": [
                            "Geist"
                    ],
                    "stats-number": [
                            "Geist"
                    ],
                    "headline-sm": [
                            "Space Grotesk"
                    ],
                    "label-sm": [
                            "Geist"
                    ],
                    "display-lg": [
                            "Space Grotesk"
                    ]
            },
            "fontSize": {
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "stats-number": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "fontWeight": "700"
                            }
                    ],
                    "headline-sm": [
                            "18px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "600"
                            }
                    ],
                    "label-sm": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "600"
                            }
                    ],
                    "display-lg": [
                            "48px",
                            {
                                    "lineHeight": "1.1",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ]
            }
    },
        },
      }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-panel-padding font-body-md overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient background glow to simulate arcade CRT emission -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden flex items-center justify-center">
<div class="absolute w-[600px] h-[600px] bg-error/10 rounded-full blur-[120px] mix-blend-screen transform translate-y-1/4"></div>
</div>
<!-- Main Content Canvas (Transaction Screen: Nav Shell Suppressed) -->
<main class="w-full max-w-md flex flex-col items-stretch z-10 relative">
<!-- Header Section -->
<header class="text-center mb-10 flex flex-col items-center">
<span class="material-symbols-outlined text-error mb-2 drop-shadow-[0_0_8px_rgba(255,180,171,0.6)]" style="font-variation-settings: 'FILL' 1; font-size: 48px;">warning</span>
<h1 class="font-display-lg text-display-lg text-error uppercase tracking-tighter drop-shadow-[0_0_12px_rgba(255,180,171,0.4)]">
                Game Over
            </h1>
</header>
<!-- Stats Bento Grid (Using grid-gap for inner-gutter effect) -->
<div class="bg-outline-variant p-[2px] rounded-lg mb-8 shadow-2xl">
<div class="grid grid-cols-2 gap-[2px] bg-outline-variant rounded-md overflow-hidden">
<!-- Final Score Component (Hero Stat) -->
<div class="col-span-2 bg-surface-container flex flex-col items-center justify-center p-8 relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em] mb-2 z-10">Final Score</h2>
<p class="font-stats-number text-[40px] leading-none font-bold text-primary drop-shadow-[0_0_6px_rgba(142,213,255,0.5)] z-10 tracking-tight">
                        142,850
                    </p>
</div>
<!-- Level Reached -->
<div class="col-span-1 bg-surface-container flex flex-col items-center justify-center p-6 hover:bg-surface-container-high transition-colors duration-200">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-1">Level</h3>
<p class="font-stats-number text-stats-number text-on-background">
                        12
                    </p>
</div>
<!-- Lines Cleared -->
<div class="col-span-1 bg-surface-container flex flex-col items-center justify-center p-6 hover:bg-surface-container-high transition-colors duration-200">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-1">Lines</h3>
<p class="font-stats-number text-stats-number text-on-background">
                        114
                    </p>
</div>
</div>
</div>
<!-- Touch Controls / Actions -->
<div class="flex flex-col gap-4 mt-2">
<!-- Primary Action -->
<button class="group h-touch-target w-full bg-transparent border border-outline-variant text-on-background font-headline-sm text-headline-sm flex items-center justify-center rounded-DEFAULT transition-all duration-150 hover:bg-primary-container hover:text-on-primary-container hover:border-primary-container focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background active:scale-[0.98]">
<span class="material-symbols-outlined mr-2 transition-transform group-hover:scale-110" style="font-variation-settings: 'FILL' 1;">replay</span>
                Play Again
            </button>
<!-- Secondary Action -->
<button class="group h-touch-target w-full bg-transparent border border-outline-variant text-on-surface-variant font-headline-sm text-headline-sm flex items-center justify-center rounded-DEFAULT transition-all duration-150 hover:bg-surface-container-high hover:text-on-background focus:outline-none focus:ring-2 focus:ring-outline-variant focus:ring-offset-2 focus:ring-offset-background active:scale-[0.98]">
<span class="material-symbols-outlined mr-2">home</span>
                Main Menu
            </button>
</div>
</main>
</body></html>
