<style>
        .tetris-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(20px, 32px));
            grid-template-rows: repeat(20, minmax(20px, 32px));
            gap: 2px;
            background-color: #334155;
            padding: 2px;
        }
        .tetris-cell {
            background-color: #0F172A;
            width: 100%;
            height: 100%;
            aspect-ratio: 1/1;
        }
        .tetris-cell.active-cyan {
            background-color: #06b6d4;
            box-shadow: 0 0 4px #06b6d4;
            border: 1px solid #cffafe;
        }
        .tetris-cell.ghost-cyan {
            border: 1px dashed #06b6d4;
            background-color: transparent;
        }
        .tetris-cell.active-yellow {
            background-color: #eab308;
            box-shadow: 0 0 4px #eab308;
            border: 1px solid #fef08a;
        }
        .tetris-cell.active-purple {
            background-color: #a855f7;
            box-shadow: 0 0 4px #a855f7;
            border: 1px solid #e9d5ff;
        }
        .control-btn {
            min-width: 44px;
            min-height: 44px;
            border: 1px solid #334155;
            color: #F8FAFC;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.25rem;
        }
        .control-btn:active {
            background-color: #38BDF8;
            color: #0F172A;
        }
    </style>
</head>
<body class="bg-background dark:bg-background text-on-background font-body-md h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background w-full top-0 border-b border-outline-variant flex justify-between items-center px-panel-padding h-touch-target transition-colors duration-200 z-10 md:hidden">
<div class="font-display-lg text-display-lg text-primary uppercase tracking-tighter text-xl">Tetris Supervisor</div>
<div class="flex gap-4">
<button class="text-primary hover:text-primary-fixed"><span class="material-symbols-outlined">settings</span></button>
<button class="text-primary hover:text-primary-fixed"><span class="material-symbols-outlined">help</span></button>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- SideNavBar -->
<nav class="bg-surface-container dark:bg-surface-container h-full w-64 left-0 fixed border-r border-outline-variant hidden md:flex flex-col py-panel-padding transition-all duration-150 z-10">
<div class="mb-8 px-4">
<div class="font-headline-sm text-headline-sm text-primary">Tetris Supervisor</div>
<div class="font-label-sm text-label-sm text-on-surface-variant mt-1">Level 01</div>
</div>
<ul class="flex-1 space-y-2">
<li>
<a class="flex items-center gap-3 px-4 py-3 text-primary font-bold border-r-2 border-primary hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-body-md text-body-md">Play</span>
</a>
</li>
<li>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-body-md text-body-md">Leaderboard</span>
</a>
</li>
<li>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">keyboard</span>
<span class="font-body-md text-body-md">Controls</span>
</a>
</li>
<li>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-body-md text-body-md">Settings</span>
</a>
</li>
</ul>
</nav>
<!-- Main Content -->
<main class="flex-1 flex flex-col md:ml-64 relative bg-[#0F172A] p-4 md:p-8 overflow-y-auto pb-24 md:pb-8">
<div class="max-w-container-max mx-auto w-full h-full flex flex-col md:flex-row items-center justify-center gap-8">
<!-- Left Stats Panel (Desktop) -->
<div class="hidden md:flex flex-col gap-4 w-48 order-1 md:order-none">
<div class="bg-[#111827] border border-[#334155] p-4 rounded-DEFAULT">
<h3 class="font-label-sm text-label-sm text-on-surface-variant mb-2">SCORE</h3>
<p class="font-stats-number text-stats-number text-primary">024,500</p>
</div>
